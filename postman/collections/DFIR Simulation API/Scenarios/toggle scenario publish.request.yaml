$kind: http-request
name: Toggle Scenario Publish
method: PATCH
url: '{{base_url}}/api/scenarios/{{scenario_id}}/publish'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response contains updated scenario", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("id");
          pm.expect(jsonData).to.have.property("is_published");
      });

      pm.test("is_published is a boolean", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.is_published).to.be.a("boolean");
      });

      pm.test("Response time is acceptable", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
