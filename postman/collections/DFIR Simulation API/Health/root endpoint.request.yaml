$kind: http-request
name: Root Endpoint
method: GET
url: '{{base_url}}/'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response contains Hello World", function () {
          pm.expect(pm.response.text()).to.include("Hello World");
      });
