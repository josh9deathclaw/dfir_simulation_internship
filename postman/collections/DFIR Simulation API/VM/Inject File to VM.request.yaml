$kind: http-request
name: Inject File to VM
method: POST
url: '{{base_url}}/api/vm/inject/:attemptId'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{auth_token}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: attemptId
    value: '{{attempt_id}}'
body:
  type: json
  content: |-
    {
      "filePath": "/path/to/inject",
      "content": "file content here"
    }
